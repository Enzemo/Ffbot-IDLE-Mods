<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS - Player Overlay</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --accent-color: #e9ac2e; 
            --text-main: #f1f5f9; 
            --text-dim: #94a3b8;
            --toast-blue: #3b82f6;
            --status-red: #ef4444;
            --status-green: #22c55e;
        }
        body { 
            background: rgba(0,0,0,0); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 10px; width: 320px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }
        .overlay { 
            background: color-mix(in srgb, var(--bg-color) 90%, transparent); 
            backdrop-filter: blur(8px);
            border: 2px solid var(--accent-color); 
            border-radius: 6px; padding: 12px; 
            position: relative; z-index: 1; min-height: 280px; 
        }

        /* Header & Stats */
        .header-container { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border-bottom: 1px solid rgba(233,172,46,0.2); padding-bottom: 8px; }
        #unit-icon { width: 64px; height: 64px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .name-stack { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; text-align: left; }
        .player-name { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; margin: 0; }
        .unit-name { color: var(--accent-color); font-weight: bold; text-transform: uppercase; font-size: 0.85rem; margin: 0; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.75rem; }
        .status-text { font-weight: 800; text-transform: uppercase; font-size: 0.7rem; width: 80px; }
        .wins-center { flex-grow: 1; text-align: center; font-weight: 800; font-size: 0.9rem; color: var(--text-main); }
        
        .label { color: var(--text-dim); text-transform: uppercase; font-size: 0.6rem; font-weight: bold; margin-bottom: 2px; }
        .stats-line { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 6px 4px; border-radius: 4px; margin-bottom: 8px; }
        .stat-unit { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-val { font-weight: 800; font-size: 0.8rem; color: var(--text-dim); }
        .highlight-text { color: var(--text-main); }
        .highlight-val { color: var(--accent-color) !important; text-shadow: 0 0 8px var(--accent-color); }

        .collection-section { background: rgba(233, 172, 46, 0.1); padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .collection-val { font-weight: 800; font-size: 0.8rem; color: var(--accent-color); }

        .passive-section { border-top: 1px solid rgba(233,172,46,0.1); padding-top: 6px; margin-top: 4px; }
        .passive-line { font-size: 0.75rem; margin-bottom: 4px; display: flex; align-items: baseline; flex-wrap: wrap; }
        .passive-highlight { color: var(--accent-color); font-weight: bold; }
        .win-prefix { color: var(--text-dim); margin-right: 4px; }
        .separator { color: var(--text-dim); margin-right: 8px; }

        /* Toast System */
        .toast-base {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); border-radius: 6px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 10px; opacity: 0;
            pointer-events: none; transition: opacity 0.4s ease-in-out;
            z-index: 100;
        }
        .toast-base.active { opacity: 1; pointer-events: auto; }
        
        #ascend-toast { border: 2px solid var(--toast-blue); }
        #freehire-toast { border: 2px solid var(--status-green); }

        /* Missing Characters Style Updates */
        #missing-toast { border: 2px solid var(--accent-color); justify-content: flex-start; padding-top: 12px; overflow: hidden; }
        .missing-header { display: flex; justify-content: space-between; align-items: baseline; width: 100%; margin-bottom: 8px; padding: 0 4px; }
        .missing-title { color: var(--accent-color); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; margin: 0; }
        .missing-count-text { color: var(--text-dim); font-size: 0.7rem; font-weight: bold; }
        
        .scroll-container { 
            width: 100%; 
            height: 240px; /* Lengthened: Shows 6 rows instead of 4 */
            overflow: hidden; 
            position: relative; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 4px; 
        }
        .scroll-content {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            width: 100%;
            position: relative;
            transform: translateY(0);
        }
        .scrolling-active {
            animation: scrollVertical linear forwards;
        }
        .scroll-item { 
            height: 40px; display: flex; align-items: center; padding: 0 5px; gap: 5px; 
            font-weight: bold; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.03); 
            white-space: nowrap; overflow: hidden; box-sizing: border-box;
        }
        .mini-icon { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }

        @keyframes scrollVertical { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(var(--scroll-dist)); } 
        }

        @keyframes winPulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: var(--status-green); } 100% { transform: scale(1); } }
        .pulse { display: inline-block; animation: winPulse 0.8s ease-in-out 12; }
    </style>
</head>
<body>
<div class="overlay">
    <div class="header-container">
        <img id="unit-icon" src="" alt="" style="visibility: hidden;">
        <div class="name-stack">
            <span class="player-name" id="p-name">PLAYER</span>
            <div id="p-unit" class="unit-name">UNIT</div>
        </div>
    </div>
    
    <div class="info-row">
        <span id="status-freehire" class="status-text">Freehire</span>
        <div class="wins-center">Wins: <span id="p-wins">-</span></div>
        <span id="status-ascension" class="status-text">Ascension</span>
    </div>
    
    <div class="stats-line">
        <div class="stat-unit"><span class="label" id="l-hp">HP</span><span class="stat-val" id="p-hp">-</span></div>
        <div class="stat-unit"><span class="label" id="l-attack">ATK</span><span class="stat-val" id="p-attack">-</span></div>
        <div class="stat-unit"><span class="label" id="l-magic">MAG</span><span class="stat-val" id="p-magic">-</span></div>
        <div class="stat-unit"><span class="label" id="l-spirit">SPI</span><span class="stat-val" id="p-spirit">-</span></div>
        <div class="stat-unit"><span class="label">Level</span><span class="stat-val" id="p-level" style="color: var(--text-main)">-</span></div>
    </div>

    <div class="collection-section">
        <span class="label">Collection Progress</span>
        <span id="p-collection" class="collection-val">- / - (-%)</span>
    </div>

    <div class="passive-section">
        <div class="passive-line">
            <span class="label">Selected Passive:</span>
            <span id="p-selected" class="passive-highlight" style="margin-left:5px;">None</span>
        </div>
        <div class="passive-line"><div id="p-available-container" style="display: flex; flex-wrap: wrap;"></div></div>
    </div>

    <div id="ascend-toast" class="toast-base">
        <div style="color: var(--toast-blue); font-weight: 800; font-size: 0.9rem; text-transform: uppercase;">Ascension Preview</div>
        <div id="toast-player" style="font-weight: bold; font-size: 1rem; margin-bottom: 4px;">-</div>
        <div class="stats-line" style="width: 90%; background: rgba(59, 130, 246, 0.1);">
            <div class="stat-unit"><span class="label">HP</span><span id="t-hp" class="stat-val">-</span></div>
            <div class="stat-unit"><span class="label">ATK</span><span id="t-atk" class="stat-val">-</span></div>
            <div class="stat-unit"><span class="label">MAG</span><span id="t-mag" class="stat-val">-</span></div>
            <div class="stat-unit"><span class="label">SPI</span><span id="t-spi" class="stat-val">-</span></div>
        </div>
    </div>

    <div id="freehire-toast" class="toast-base">
        <div id="fh-pname" style="font-weight: 800; font-size: 1.1rem; text-transform: uppercase;">-</div>
        <img id="fh-unit-icon" src="" alt="" style="width: 80px; height: 80px; object-fit: contain; margin: 10px 0; display: none;">
        <div id="fh-unit" style="color: var(--status-green); font-weight: bold; font-size: 1.3rem; margin-top: 5px;">-</div>
    </div>

    <div id="missing-toast" class="toast-base">
        <div class="missing-header">
            <h2 class="missing-title">Missing Characters</h2>
            <span class="missing-count-text">Total: <span id="missing-count">0</span></span>
        </div>
        <div class="scroll-container">
            <div id="missing-scroll-list" class="scroll-content"></div>
        </div>
    </div>
</div>

<script>
    let lastAscendContent = null, lastFreehireContent = null, lastMissingContent = null;
    let currentWins = 0, csvMapping = [], toastQueue = [], isToastShowing = false;

    function loadCSV() {
        fetch("FFBot.csv?t=" + Date.now()).then(r => r.text()).then(text => {
            const lines = text.split(/\r?\n/);
            csvMapping = lines.map(line => {
                const cols = line.split(',');
                return { id: cols[1]?.trim(), file: cols[2]?.trim() };
            }).filter(item => item.id && item.file);
        });
    }

    function formatStat(num) {
        if (!num || isNaN(num)) return "-";
        if (num >= 1000000000000) return (num / 1000000000000).toFixed(2).replace(/\.00$/, '') + "t";
        if (num >= 1000000000) return (num / 1000000000).toFixed(2).replace(/\.00$/, '') + "b";
        if (num >= 1000000) return (num / 1000000).toFixed(2).replace(/\.00$/, '') + "M";
        if (num >= 1000) return Math.floor(num / 1000) + "k";
        return num;
    }

    function processQueue() {
        if (isToastShowing || toastQueue.length === 0) return;
        isToastShowing = true;
        const currentItem = toastQueue.shift();
        const element = document.getElementById(currentItem.id);
        element.classList.add('active');

        if(currentItem.id === 'missing-toast') {
            const scrollList = document.getElementById('missing-scroll-list');
            scrollList.classList.remove('scrolling-active');
            setTimeout(() => { if (element.classList.contains('active')) scrollList.classList.add('scrolling-active'); }, 2000);
        }

        setTimeout(() => {
            element.classList.remove('active');
            setTimeout(() => { isToastShowing = false; processQueue(); }, 400);
        }, currentItem.duration);
    }

    function updatePlayer() {
        fetch("player_stats.json?t=" + Date.now()).then(r => r.json()).then(data => {
            const char = data.character_info || {}, basic = data.basic_stats || {}, passives = data.passives || {}, fh = data.free_hire || {}, coll = data.collection || {};
            document.getElementById('p-name').innerText = data.player_name || "PLAYER";
            document.getElementById('p-unit').innerText = char.unit || "UNIT";
            if (csvMapping.length > 0) {
                const match = csvMapping.find(m => m.id === char.unit);
                const imgEl = document.getElementById('unit-icon');
                if (match) { imgEl.src = `units/${match.file}.png`; imgEl.style.visibility = 'visible'; }
            }
            currentWins = basic.wins ?? 0;
            document.getElementById('p-wins').innerText = currentWins;
            document.getElementById('p-level').innerText = formatStat(basic.level);
            document.getElementById('p-collection').innerText = `${coll.collected ?? 0}/${coll.total ?? 0} (${coll.percentage ?? 0}%)`;
            document.getElementById('status-freehire').style.color = fh.available ? "var(--status-green)" : "var(--status-red)";
            document.getElementById('status-ascension').style.color = currentWins >= 100 ? "var(--status-green)" : "var(--status-red)";
            let pref = (basic.preferred_stat || "").toLowerCase();
            ['hp', 'attack', 'magic', 'spirit'].forEach(k => {
                const valEl = document.getElementById('p-' + k), lbl = document.getElementById('l-' + k);
                valEl.innerText = formatStat(basic[k]);
                if(k === (pref === "atk"?"attack":(pref==="mag"?"magic":(pref==="spi"?"spirit":pref)))) { valEl.classList.add('highlight-val'); lbl.classList.add('highlight-text'); }
                else { valEl.classList.remove('highlight-val'); lbl.classList.remove('highlight-text'); }
            });
            document.getElementById('p-selected').innerText = passives.season5_passive || "None";
            const container = document.getElementById('p-available-container');
            container.innerHTML = "";
            (passives.available_passives || []).forEach((p, i) => {
                const wrapper = document.createElement('span');
                wrapper.innerHTML = `<span class="win-prefix">${i==0?"100w: ":(i==1?"200w: ":"")}</span><span class="passive-highlight">${p.name}</span>${i < passives.available_passives.length-1 ? '<span class="separator">,</span>' : ''}`;
                container.appendChild(wrapper);
            });
        }).catch(e => console.warn(e));
    }

    function checkAscendFile() {
        fetch("ascend_stats.json?t=" + Date.now()).then(r => r.text()).then(text => {
            if (lastAscendContent !== null && text !== lastAscendContent) {
                const data = JSON.parse(text), stats = data.new_stats_after_ascend || {};
                document.getElementById('toast-player').innerText = data.player_name || "PLAYER";
                ['hp','atk','mag','spi'].forEach(s => document.getElementById('t-'+s).innerText = formatStat(stats[s === 'atk' ? 'attack' : (s === 'mag' ? 'magic' : (s === 'spi' ? 'spirit' : s))]));
                toastQueue.push({ id: 'ascend-toast', duration: 8000 });
                processQueue();
            }
            lastAscendContent = text;
        });
    }

    function checkFreehireFile() {
        fetch("freehire.json?t=" + Date.now()).then(r => r.json()).then(data => {
            const rawText = JSON.stringify(data);
            if (lastFreehireContent !== null && rawText !== lastFreehireContent) {
                if (data.event_type === "freehire_assigned") {
                    document.getElementById('fh-pname').innerText = data.player_name;
                    document.getElementById('fh-unit').innerText = data.freehire_character;
                    const match = csvMapping.find(m => m.id === data.freehire_character);
                    if (match) { document.getElementById('fh-unit-icon').src = `units/${match.file}.png`; document.getElementById('fh-unit-icon').style.display = 'block'; }
                    toastQueue.push({ id: 'freehire-toast', duration: 8000 });
                    processQueue();
                }
            }
            lastFreehireContent = rawText;
        });
    }

    function checkMissingCharacters() {
        fetch("missing_characters.json?t=" + Date.now()).then(r => r.text()).then(text => {
            if (lastMissingContent !== null && text !== lastMissingContent) {
                const data = JSON.parse(text);
                const list = (data.missing_characters.all_missing || []).sort();
                const scrollList = document.getElementById('missing-scroll-list');
                document.getElementById('missing-count').innerText = data.missing_characters.total_missing_count || 0;
                scrollList.innerHTML = "";
                list.forEach(name => {
                    const match = csvMapping.find(m => m.id === name);
                    const item = document.createElement('div');
                    item.className = 'scroll-item';
                    item.innerHTML = `${match ? `<img src="units/${match.file}.png" class="mini-icon">` : `<div style="width:24px"></div>`} <span>${name}</span>`;
                    scrollList.appendChild(item);
                });
                
                const rowCount = Math.ceil(list.length / 2);
                const visibleRows = 6; // Matching container height (240px / 40px)
                const scrollDist = Math.max(0, (rowCount - visibleRows) * 40);
                scrollList.style.setProperty('--scroll-dist', `-${scrollDist}px`);
                
                const scrollDuration = Math.max(1, (rowCount - visibleRows) * 1.5);
                scrollList.style.animationDuration = `${scrollDuration}s`;
                
                toastQueue.push({ id: 'missing-toast', duration: (2 + scrollDuration + 2) * 1000 });
                processQueue();
            }
            lastMissingContent = text;
        });
    }

    loadCSV();
    setInterval(updatePlayer, 2000);
    setInterval(checkAscendFile, 1000);
    setInterval(checkFreehireFile, 1000);
    setInterval(checkMissingCharacters, 2000);
    updatePlayer();
</script>
</body>
</html>
